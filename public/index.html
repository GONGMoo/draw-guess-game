<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f8b8d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="你画我猜" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>你画我猜</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="icon" href="/icon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>你画我猜</h1>
          <p id="statusText">创建房间，邀请朋友输入房间号加入。</p>
        </div>
        <div class="room-badge">
          <span>房间</span>
          <strong id="roomCode">----</strong>
        </div>
      </section>

      <section id="lobby" class="lobby">
        <label>
          昵称
          <input id="nameInput" maxlength="12" placeholder="玩家" />
        </label>
        <label>
          词库
          <select id="wordBankSelect">
            <option value="daily">日常</option>
            <option value="animals">动物</option>
            <option value="food">食物</option>
            <option value="objects">物品</option>
            <option value="advanced">进阶抽象</option>
            <option value="mixed">混合</option>
          </select>
        </label>
        <label>
          模式
          <select id="modeSelect">
            <option value="classic">双人猜画</option>
            <option value="relay">多人接龙</option>
          </select>
        </label>
        <button id="createBtn">创建房间</button>
        <div class="join-row">
          <input id="joinInput" inputmode="numeric" maxlength="4" placeholder="输入房间号" />
          <button id="joinBtn">加入</button>
        </div>
      </section>

      <section id="game" class="game hidden">
        <aside class="panel">
          <div class="answer-box">
            <span id="roleLabel">等待中</span>
            <strong id="answerLabel">----</strong>
          </div>
          <div class="timer">
            <span>倒计时</span>
            <strong id="timerLabel">90</strong>
          </div>
          <div class="word-bank">
            <span>词库</span>
            <strong id="wordBankLabel">日常</strong>
          </div>
          <button id="startRoundBtn" class="secondary hidden">开始接龙</button>
          <div id="players" class="players"></div>
          <div id="messages" class="messages"></div>
          <div id="relayResults" class="relay-results hidden"></div>
          <form id="guessForm" class="guess-form">
            <input id="guessInput" autocomplete="off" placeholder="输入答案" />
            <button>发送</button>
          </form>
        </aside>

        <section class="board-wrap">
          <canvas id="board" width="960" height="640"></canvas>
          <div class="tools">
            <input id="colorInput" type="color" value="#202124" aria-label="画笔颜色" />
            <input id="sizeInput" type="range" min="2" max="24" value="6" aria-label="画笔大小" />
            <button id="clearBtn">清空</button>
            <button id="submitRelayBtn" class="secondary hidden">提交本棒</button>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
